# render.yaml - Corrected version
services:
  - type: web
    name: pos-backend
    runtime: image
    repo: https://github.com/yourusername/pos-system
    branch: main
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: pos-database
          property: host
      - key: DB_PORT
        fromDatabase:
          name: pos-database
          property: port
      - key: DB_USER
        fromDatabase:
          name: pos-database
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: pos-database
          property: password
      - key: DB_NAME
        fromDatabase:
          name: pos-database
          property: database
      - key: GIN_MODE
        value: release
      - key: PORT
        value: 8080

databases:
  - name: pos-database
    databaseName: pos_system
    user: pos_user  # ✅ Changed from 'postgres' to 'pos_user'
    plan: free
